# ─────────────────────────────────────────────────────────────────────────
# Alembic configuration.
#
# The actual database URL is NOT set here; migrations/env.py loads it from the
# application settings (settings.sync_database_url) so there is a single source
# of truth and no secrets live in this file.
# ─────────────────────────────────────────────────────────────────────────
[alembic]
# Path to migration scripts (relative to this file).
script_location = migrations

# Template used to generate revision filenames: <date>_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Use OS path separators in version locations.
version_path_separator = os

# sqlalchemy.url is intentionally blank — set at runtime in migrations/env.py.
sqlalchemy.url =


[post_write_hooks]
# Auto-format generated migrations with ruff.
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME


# ── Logging ────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
